<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Web Server UKK - Alfa</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: #fff;
    }

    .container {
      text-align: center;
      padding: 3rem 2rem;
      max-width: 700px;
      width: 90%;
    }

    .badge {
      display: inline-block;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 50px;
      padding: 0.4rem 1.2rem;
      font-size: 0.85rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #a8d8ea;
      margin-bottom: 2rem;
    }

    .welcome {
      font-size: 2rem;
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: 2.5rem;
      color: #ffffff;
      text-shadow: 0 2px 10px rgba(0,0,0,0.3);
    }

    .welcome span {
      color: #f5a623;
    }

    .card {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 16px;
      padding: 2rem 2.5rem;
      margin-bottom: 2rem;
      backdrop-filter: blur(10px);
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.9rem 0;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .info-row:last-child {
      border-bottom: none;
    }

    .info-label {
      font-size: 0.9rem;
      color: #a8d8ea;
      letter-spacing: 1px;
      text-transform: uppercase;
      font-weight: 500;
    }

    .info-value {
      font-size: 1rem;
      font-weight: 600;
      color: #ffffff;
    }

    .footer-text {
      margin-top: 1rem;
      font-size: 0.85rem;
      color: rgba(255,255,255,0.5);
      letter-spacing: 1px;
    }

    .divider {
      width: 60px;
      height: 3px;
      background: linear-gradient(90deg, #f5a623, #e8401c);
      border-radius: 2px;
      margin: 0 auto 2rem;
    }

    .tp-badge {
      display: inline-block;
      background: linear-gradient(135deg, #f5a623, #e8401c);
      border-radius: 50px;
      padding: 0.6rem 1.5rem;
      font-size: 0.95rem;
      font-weight: 600;
      color: #fff;
      letter-spacing: 1px;
      margin-top: 1rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="badge">Ujian Kompetensi Keahlian</div>

    <div class="welcome">
      Selamat Datang di<br><span>Web Server UKK</span>
    </div>

    <div class="divider"></div>

    <div class="card">
      <div class="info-row">
        <span class="info-label">Nama Peserta</span>
        <span class="info-value">M. SALMAN ALFARITSI DEANATA</span>
      </div>
      <div class="info-row">
        <span class="info-label">Kelas</span>
        <span class="info-value">12 TKJ 3</span>
      </div>
    </div>

    <div class="tp-badge">Uji Kompetensi Keahlian &nbsp;|&nbsp; TP. 2025/2026</div>

    <p class="footer-text">Teknik Komputer dan Jaringan &mdash; SMKN 4 Payakumbuh</p>
  </div>
</body>
</html>
